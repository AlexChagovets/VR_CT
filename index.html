<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>VR_CT AR Surface from PA1</title>

    <!-- A-Frame: створення 3D-сцени -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

    <!-- AR.js: розпізнавання маркера через камеру -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

    <!-- Модель / поверхня з PA1 -->
    <script src="./Model.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #status {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 9999;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            font-size: 16px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div id="status">Очікування маркера...</div>

<script>
    /*
        Компонент A-Frame для відображення поверхні з PA1.
        Дані поверхні беруться з функції CreateSurfaceData(data),
        яка знаходиться у файлі Model.js.
    */
    AFRAME.registerComponent("pa1-surface", {
        init: function () {
            const data = {};

            if (typeof CreateSurfaceData !== "function") {
                console.error("CreateSurfaceData не знайдено. Перевір, чи підключений Model.js.");
                return;
            }

            CreateSurfaceData(data);

            const geometry = new THREE.BufferGeometry();

            geometry.setAttribute(
                "position",
                new THREE.BufferAttribute(data.verticesF32, 3)
            );

            geometry.setIndex(
                new THREE.BufferAttribute(data.indicesU16, 1)
            );

            geometry.computeVertexNormals();

            const material = new THREE.MeshStandardMaterial({
                color: "#dddddd",
                side: THREE.DoubleSide,
                roughness: 0.5,
                metalness: 0.05
            });

            const mesh = new THREE.Mesh(geometry, material);

            /*
                Масштаб і поворот підібрані для AR-маркера.
                Якщо поверхня буде завелика або мала — міняємо scale нижче в a-entity.
            */
            this.el.setObject3D("mesh", mesh);
        }
    });
</script>

<a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono;"
>
    <!-- Маркер, згенерований у AR.js Marker Training -->
    <a-marker
        id="marker"
        type="pattern"
        url="./markers/pattern-marker.patt"
    >

        <!-- Поверхня з PA1 -->
        <a-entity
            pa1-surface
            position="0 0.15 0"
            rotation="-90 70 0"
            scale="0.9 0.9 0.9">
        </a-entity>

        <!-- Основа на маркері, щоб було видно площину прив'язки -->
        <a-plane
            position="0 0.01 0"
            rotation="-90 0 0"
            width="2.4"
            height="2.4"
            color="#111111"
            opacity="0.25"
            transparent="true">
        </a-plane>

        <!-- Підпис -->
        <a-text
            value="PA1 Surface"
            position="-0.95 1.2 -1.1"
            rotation="-90 0 0"
            color="yellow"
            width="3">
        </a-text>

        <a-text
            value="VR_CT"
            position="-0.45 0.08 1.05"
            rotation="-90 0 0"
            color="white"
            width="2.5">
        </a-text>

    </a-marker>

    <!-- Освітлення -->
    <a-entity light="type: ambient; intensity: 0.8"></a-entity>
    <a-entity light="type: directional; intensity: 0.9" position="1 2 1"></a-entity>

    <!-- Камера AR-сцени -->
    <a-entity camera></a-entity>
</a-scene>

<script>
    const marker = document.querySelector("#marker");
    const statusText = document.querySelector("#status");

    marker.addEventListener("markerFound", function () {
        statusText.textContent = "Маркер знайдено";
        statusText.style.background = "rgba(0, 150, 0, 0.85)";
    });

    marker.addEventListener("markerLost", function () {
        statusText.textContent = "Маркер втрачено";
        statusText.style.background = "rgba(150, 0, 0, 0.85)";
    });
</script>

</body>
</html>
