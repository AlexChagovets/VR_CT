<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>VR_CT AR.js Marker</title>

    <!-- A-Frame: бібліотека для створення 3D-сцени -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <!-- AR.js: бібліотека для роботи з камерою та marker tracking -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        .info {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 9999;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.65);
            color: white;
            font-family: Arial, sans-serif;
            font-size: 14px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="info">
    VR_CT AR marker demo
</div>

<a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
    arjs="sourceType: webcam; debugUIEnabled: false;"
>
    <!-- 
        Стандартний AR.js marker.
        Файл pattern-marker.patt має лежати у папці markers.
    -->
    <a-marker type="pattern" url="./markers/pattern-marker.patt">

        <!-- Великий тестовий куб.
             Якщо marker розпізнається, цей куб має з'явитися поверх нього. -->
        <a-box
            position="0 0.5 0"
            rotation="0 45 0"
            width="1"
            height="1"
            depth="1"
            color="red">
        </a-box>

        <!-- Підпис над кубом -->
        <a-text
            value="VR_CT"
            position="-0.55 1.25 0"
            rotation="-90 0 0"
            color="blue"
            width="3">
        </a-text>

    </a-marker>

    <!-- Камера AR-сцени -->
    <a-entity camera></a-entity>
</a-scene>

</body>
</html>
