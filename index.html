<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>VR CT - AR.js Marker</title>

    <!-- A-Frame бібліотека для створення 3D-сцени -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <!-- AR.js бібліотека для роботи з камерою та marker tracking -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>

<a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
>
    <!-- Стандартний AR.js marker -->
    <a-marker type="pattern" url="./markers/pattern-marker.patt">

        <!-- Основний 3D-об'єкт -->
        <a-box
            position="0 0.5 0"
            rotation="0 45 0"
            width="0.9"
            height="0.9"
            depth="0.9"
            color="#dddddd">
        </a-box>

        <!-- Червона вертикальна лінія, як візуальний акцент з PA1 -->
        <a-cylinder
            position="-0.15 0.55 0.5"
            rotation="0 0 0"
            radius="0.035"
            height="0.9"
            color="red">
        </a-cylinder>

        <!-- Бірюзова вертикальна лінія, як другий візуальний акцент -->
        <a-cylinder
            position="0.15 0.55 0.5"
            rotation="0 0 0"
            radius="0.035"
            height="0.9"
            color="cyan">
        </a-cylinder>

        <!-- Підпис роботи -->
        <a-text
            value="VR_CT"
            position="-0.65 1.15 0"
            rotation="-90 0 0"
            color="blue"
            width="3">
        </a-text>

    </a-marker>

    <!-- Камера AR-сцени -->
    <a-entity camera></a-entity>
</a-scene>

</body>
</html>
